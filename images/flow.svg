<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400" fill="none">
  <rect width="900" height="400" rx="16" fill="#1C1C1E"/>

  <!-- Daily Notes Box -->
  <rect x="40" y="120" width="220" height="160" rx="12" fill="#2C2C2E" stroke="#48484A" stroke-width="1.5"/>
  <text x="150" y="160" text-anchor="middle" font-family="-apple-system, SF Pro Display, Helvetica, Arial, sans-serif" font-size="18" font-weight="600" fill="#FFFFFF">Daily Notes</text>
  <text x="150" y="190" text-anchor="middle" font-family="-apple-system, SF Pro Text, Helvetica, Arial, sans-serif" font-size="13" fill="#AEAEB2">Every day</text>
  <line x1="80" y1="210" x2="220" y2="210" stroke="#48484A" stroke-width="0.5"/>
  <text x="150" y="235" text-anchor="middle" font-family="-apple-system, SF Pro Text, Helvetica, Arial, sans-serif" font-size="12" fill="#8E8E93">Gratitude · Intentions</text>
  <text x="150" y="255" text-anchor="middle" font-family="-apple-system, SF Pro Text, Helvetica, Arial, sans-serif" font-size="12" fill="#8E8E93">Wins · Lessons · Reflection</text>

  <!-- Arrow 1 -->
  <line x1="270" y1="200" x2="320" y2="200" stroke="#FF9F0A" stroke-width="2" stroke-linecap="round"/>
  <polygon points="320,194 334,200 320,206" fill="#FF9F0A"/>
  <text x="302" y="170" text-anchor="middle" font-family="-apple-system, SF Pro Text, Helvetica, Arial, sans-serif" font-size="11" fill="#FF9F0A">AI reads</text>
  <text x="302" y="185" text-anchor="middle" font-family="-apple-system, SF Pro Text, Helvetica, Arial, sans-serif" font-size="11" fill="#FF9F0A">28-31 entries</text>

  <!-- Monthly Review Box -->
  <rect x="340" y="120" width="220" height="160" rx="12" fill="#2C2C2E" stroke="#48484A" stroke-width="1.5"/>
  <text x="450" y="160" text-anchor="middle" font-family="-apple-system, SF Pro Display, Helvetica, Arial, sans-serif" font-size="18" font-weight="600" fill="#FFFFFF">Monthly Review</text>
  <text x="450" y="190" text-anchor="middle" font-family="-apple-system, SF Pro Text, Helvetica, Arial, sans-serif" font-size="13" fill="#AEAEB2">End of each month</text>
  <line x1="380" y1="210" x2="520" y2="210" stroke="#48484A" stroke-width="0.5"/>
  <text x="450" y="235" text-anchor="middle" font-family="-apple-system, SF Pro Text, Helvetica, Arial, sans-serif" font-size="12" fill="#8E8E93">Wins · Challenges · Lessons</text>
  <text x="450" y="255" text-anchor="middle" font-family="-apple-system, SF Pro Text, Helvetica, Arial, sans-serif" font-size="12" fill="#8E8E93">Key Moments · Review by Area</text>

  <!-- Arrow 2 -->
  <line x1="570" y1="200" x2="620" y2="200" stroke="#FF9F0A" stroke-width="2" stroke-linecap="round"/>
  <polygon points="620,194 634,200 620,206" fill="#FF9F0A"/>
  <text x="602" y="170" text-anchor="middle" font-family="-apple-system, SF Pro Text, Helvetica, Arial, sans-serif" font-size="11" fill="#FF9F0A">AI reads</text>
  <text x="602" y="185" text-anchor="middle" font-family="-apple-system, SF Pro Text, Helvetica, Arial, sans-serif" font-size="11" fill="#FF9F0A">3 reviews</text>

  <!-- Quarterly Review Box -->
  <rect x="640" y="120" width="220" height="160" rx="12" fill="#2C2C2E" stroke="#FF9F0A" stroke-width="1.5"/>
  <text x="750" y="155" text-anchor="middle" font-family="-apple-system, SF Pro Display, Helvetica, Arial, sans-serif" font-size="18" font-weight="600" fill="#FFFFFF">Quarterly Review</text>
  <text x="750" y="178" text-anchor="middle" font-family="-apple-system, SF Pro Display, Helvetica, Arial, sans-serif" font-size="16" font-weight="600" fill="#FFFFFF">+ Plan</text>
  <text x="750" y="202" text-anchor="middle" font-family="-apple-system, SF Pro Text, Helvetica, Arial, sans-serif" font-size="13" fill="#AEAEB2">End of each quarter</text>
  <line x1="680" y1="218" x2="820" y2="218" stroke="#48484A" stroke-width="0.5"/>
  <text x="750" y="241" text-anchor="middle" font-family="-apple-system, SF Pro Text, Helvetica, Arial, sans-serif" font-size="12" fill="#8E8E93">Goals · Habits · Focus Areas</text>
  <text x="750" y="261" text-anchor="middle" font-family="-apple-system, SF Pro Text, Helvetica, Arial, sans-serif" font-size="12" fill="#8E8E93">Monthly Breakdown · Not-To-Do</text>

  <!-- Bottom tagline -->
  <text x="450" y="340" text-anchor="middle" font-family="-apple-system, SF Pro Text, Helvetica, Arial, sans-serif" font-size="14" fill="#636366">You write daily. AI finds the patterns. You make the decisions.</text>

  <!-- Frequency labels -->
  <rect x="110" y="76" width="80" height="26" rx="13" fill="#3A3A3C"/>
  <text x="150" y="94" text-anchor="middle" font-family="-apple-system, SF Pro Text, Helvetica, Arial, sans-serif" font-size="12" font-weight="500" fill="#FF9F0A">~5 min/day</text>

  <rect x="405" y="76" width="90" height="26" rx="13" fill="#3A3A3C"/>
  <text x="450" y="94" text-anchor="middle" font-family="-apple-system, SF Pro Text, Helvetica, Arial, sans-serif" font-size="12" font-weight="500" fill="#FF9F0A">1 AI session</text>

  <rect x="705" y="76" width="90" height="26" rx="13" fill="#3A3A3C"/>
  <text x="750" y="94" text-anchor="middle" font-family="-apple-system, SF Pro Text, Helvetica, Arial, sans-serif" font-size="12" font-weight="500" fill="#FF9F0A">1 AI session</text>
</svg>